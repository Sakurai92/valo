<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VALORANT タイムアタック</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="time-attack.css">
</head>
<body>

  <div id="screen-loading" class="screen active">
    <div class="spinner"></div>
    <p>データを読み込み中…</p>
  </div>

  <div id="screen-start" class="screen">
    <div class="select-inner">
      <a href="index.html" class="btn-home">← ホーム</a>
      <p class="label">VALORANT</p>
      <h1>タイムアタック</h1>
      <p class="desc">カテゴリを選んでスタート<br>30秒・正解 +1pt・誤答 −1pt・パスは増減なし</p>
      <div id="category-list" class="category-list"></div>
    </div>
  </div>

  <div id="screen-quiz" class="screen">
    <header class="quiz-header">
      <button id="btn-back" class="btn-back">← 選択</button>
      <div class="timer-num-wrap">
        <span id="timer-num">30</span>
        <span class="timer-unit">秒</span>
      </div>
      <div class="score-wrap">
        <span id="score">0</span><span class="score-unit">pt</span>
      </div>
    </header>

    <div class="timer-bar-wrap">
      <div id="timer-bar" class="timer-bar"></div>
    </div>

    <div class="quiz-body">
      <p id="q-label" class="q-label"></p>
      <div class="image-wrap">
        <img id="q-image" src="" alt="">
      </div>
      <div id="choices" class="choices"></div>
      <button id="btn-pass" class="btn-pass">パス（増減なし）</button>
    </div>
  </div>

  <div id="screen-result" class="screen">
    <div class="result-inner">
      <a href="index.html" class="btn-home">← ホーム</a>
      <p class="label">VALORANT</p>
      <h2>タイムアップ！</h2>
      <div class="result-score-wrap">
        <span id="result-score">0</span>
        <span class="result-pt">pt</span>
      </div>
      <div class="result-stats">
        <div class="stat correct">✓ <span id="stat-correct">0</span></div>
        <div class="stat wrong">✗ <span id="stat-wrong">0</span></div>
        <div class="stat pass">→ <span id="stat-pass">0</span></div>
      </div>
      <p id="result-msg" class="result-msg"></p>
      <button id="btn-retry" class="btn-primary">もう一度</button>
      <button id="btn-change" class="btn-change">カテゴリ変更</button>
    </div>
  </div>

  <script src="time-attack.js"></script>
</body>
</html>
